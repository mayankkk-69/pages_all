        <!-- ===== FILTER CARD ===== -->
        <div class="card section-card mt-section">
            <div class="card-header-row">
                <div class="card-title-left">
                    <span class="vertical-accent accent-orange"></span>
                    <h3>Filter Overtime Records</h3>
                </div>
                <div class="card-title-right">
                    <span class="text-muted">Select month and year to view overtime records</span>
                </div>
            </div>

            <div class="filters-grid">
                <div class="filter-group">
                    <label>Month</label>
                    <div class="custom-dropdown filter-dropdown" id="month-dropdown">
                        <div class="dropdown-trigger form-input">
                            <i class="ph ph-calendar-blank input-icon"></i>
                            <span class="selected-value">March</span>
                            <i class="ph ph-caret-down caret-icon"></i>
                        </div>
                        <ul class="dropdown-options style-scroll">
                            <li>January</li>
                            <li>February</li>
                            <li class="selected">March</li>
                            <li>April</li>
                            <li>May</li>
                            <li>June</li>
                            <li>July</li>
                            <li>August</li>
                            <li>September</li>
                            <li>October</li>
                            <li>November</li>
                            <li>December</li>
                        </ul>
                    </div>
                </div>
                <div class="filter-group">
                    <label>Year</label>
                    <div class="custom-dropdown filter-dropdown" id="year-dropdown">
                        <div class="dropdown-trigger form-input">
                            <i class="ph ph-calendar-blank input-icon"></i>
                            <span class="selected-value">2026</span>
                            <i class="ph ph-caret-down caret-icon"></i>
                        </div>
                        <ul class="dropdown-options style-scroll">
                            <li class="selected">2026</li>
                            <li>2025</li>
                            <li>2024</li>
                        </ul>
                    </div>
                </div>
                <div class="filter-actions">
                    <label>&nbsp;</label>
                    <div class="action-buttons">
                        <button class="btn-primary" id="apply-filters"><i class="ph ph-funnel"></i> Apply Filters</button>
                    </div>
                </div>
            </div>
        </div>
