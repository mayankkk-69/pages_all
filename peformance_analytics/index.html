<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Analytics | CRM</title>
    <meta name="description" content="Comprehensive overview of your work performance and productivity metrics in the CRM system.">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Section-specific CSS (load order matters) -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/summary.css">
    <link rel="stylesheet" href="css/trend.css">
    <link rel="stylesheet" href="css/middle.css">
    <link rel="stylesheet" href="css/tracking.css">
    <link rel="stylesheet" href="css/bottom.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>

<div class="app-container">
    <div id="header-container"></div>
    <div id="summary-container"></div>
    <div id="trend-container"></div>
    <div id="middle-container"></div>
    <div id="tracking-container"></div>
    <div id="bottom-container"></div>
</div>

<script>
    const sections = [
        { id: 'header-container',   path: 'sections/header.html'   },
        { id: 'summary-container',  path: 'sections/summary.html'  },
        { id: 'trend-container',    path: 'sections/trend.html'    },
        { id: 'middle-container',   path: 'sections/middle.html'   },
        { id: 'tracking-container', path: 'sections/tracking.html' },
        { id: 'bottom-container',   path: 'sections/bottom.html'   }
    ];

    async function loadSections() {
        // Load all section HTML first
        const v = Date.now();
        for (const s of sections) {
            const res  = await fetch(s.path + '?v=' + v);
            const html = await res.text();
            document.getElementById(s.id).innerHTML = html;
        }

        // IMPORTANT: innerHTML does NOT execute <script> tags.
        // All JS must be loaded externally AFTER all HTML is in the DOM.
        
        // Fetch data from database via API
        try {
            const apiRes = await fetch('api.php?t=' + Date.now());
            window.apiData = await apiRes.json();
        } catch(e) {
            console.error("Failed to load db data:", e);
            window.apiData = { summary: {}, pie: [0,0,0,0], trend: { data6M: {labels:[], efficiency:[], completion:[]}, data12M: {labels:[], efficiency:[], completion:[]} }, tasks: [] };
        }

        // Load in dependency order:
        loadScript('js/header.js?v=' + v);     // date injection
        loadScript('js/summary.js?v=' + v);    // month label
        loadScript('js/tracking.js?v=' + v);   // filter pills (setFilter)
        loadScript('js/bottom.js?v=' + v);     // custom dropdown + search
        loadScript('js/trend.js?v=' + v);      // performance trend chart
        loadScript('js/middle.js?v=' + v);     // task status pie chart
    }

    function loadScript(src) {
        const el  = document.createElement('script');
        el.src    = src;
        el.async  = false; // preserve load order
        document.body.appendChild(el);
    }

    loadSections();
</script>

</body>
</html>
