<div class="section-card">
    <div class="card-header-row">
        <div class="card-title-left">
            <span class="vertical-accent"></span>
            <h3>Performance Summary</h3>
        </div>
        <span class="card-title-right" id="summary-month-label">—</span>
    </div>

    <div class="summary-grid">
        <!-- Overall Efficiency -->
        <div class="stat-card green">
            <div class="stat-top">
                <div>
                    <div class="stat-label">Overall Efficiency</div>
                </div>
                <div class="stat-icon">
                    <i class="fas fa-bullseye"></i>
                </div>
            </div>
            <div class="stat-value">0%</div>
            <div class="stat-sub">On-time completion rate</div>
        </div>

        <!-- Active Tasks -->
        <div class="stat-card blue">
            <div class="stat-top">
                <div>
                    <div class="stat-label">Active Tasks</div>
                </div>
                <div class="stat-icon">
                    <i class="fas fa-tasks"></i>
                </div>
            </div>
            <div class="stat-value">0</div>
            <div class="stat-sub">Currently in progress</div>
        </div>

        <!-- This Month -->
        <div class="stat-card cyan">
            <div class="stat-top">
                <div>
                    <div class="stat-label">This Month</div>
                </div>
                <div class="stat-icon">
                    <i class="fas fa-calendar-check"></i>
                </div>
            </div>
            <div class="stat-value">0</div>
            <div class="stat-sub">Tasks completed</div>
        </div>

        <!-- Upcoming Deadlines -->
        <div class="stat-card amber">
            <div class="stat-top">
                <div>
                    <div class="stat-label">Upcoming Deadlines</div>
                </div>
                <div class="stat-icon">
                    <i class="far fa-clock"></i>
                </div>
            </div>
            <div class="stat-value">0</div>
            <div class="stat-sub">Next 7 days</div>
        </div>
    </div>
</div>
