<div class="section-card">
    <div class="card-header-row">
        <div class="card-title-left">
            <span class="vertical-accent"></span>
            <h3>Detailed Completion Tracking</h3>
        </div>
        <div class="filter-pills">
            <button class="pill-btn active" onclick="setFilter(this, 'all')">All Tasks</button>
            <button class="pill-btn" onclick="setFilter(this, 'stages')">Stages Only</button>
            <button class="pill-btn" onclick="setFilter(this, 'substages')">Substages Only</button>
            <button class="pill-btn" onclick="setFilter(this, 'late')">Late Tasks</button>
        </div>
    </div>

    <!-- Mini stat cards — each has a data-filter attribute -->
    <div class="tracking-cards">
        <div class="track-card" data-filter="all stages">
            <div class="track-icon blue">
                <i class="fas fa-layer-group"></i>
            </div>
            <div class="track-info">
                <div class="lbl">Stages</div>
                <div class="num" id="stages-count">0</div>
                <div class="sub">0 completed &bull; 0 on-time</div>
            </div>
        </div>

        <div class="track-card" data-filter="all substages">
            <div class="track-icon cyan">
                <i class="fas fa-list-ul"></i>
            </div>
            <div class="track-info">
                <div class="lbl">Substages</div>
                <div class="num" id="substages-count">0</div>
                <div class="sub">0 completed &bull; 0 on-time</div>
            </div>
        </div>

        <div class="track-card" data-filter="all late">
            <div class="track-icon red">
                <i class="fas fa-exclamation-circle"></i>
            </div>
            <div class="track-info">
                <div class="lbl">Late Tasks</div>
                <div class="num" id="late-count">0</div>
                <div class="sub">0 overdue</div>
            </div>
        </div>
    </div>
</div>
