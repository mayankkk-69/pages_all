<section class="hr-custom-section" id="hrCustomSection">
    <div class="hr-custom-card" id="manageListView">
        <div class="hr-custom-card-header">
            <h2 class="hr-custom-card-title">Manage Old Policies</h2>
            <p class="hr-custom-card-subtitle">Review, edit, and update previously published company policies.</p>
        </div>

        <!-- Render list of policies here -->
        <div class="hr-policy-list" id="hrPolicyList">
            <div class="hr-policy-list-loader">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Loading policies...
            </div>
        </div>
    </div>

    <!-- Edit Policy View (Hidden by default) -->
    <div class="hr-custom-card" id="manageEditView" style="display: none;">
        <div class="hr-custom-card-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2 class="hr-custom-card-title">Edit Policy</h2>
                <p class="hr-custom-card-subtitle">Update the details of the selected policy.</p>
            </div>
            <button type="button" class="hr-btn-back" id="btnBackToList">
                <i class="fa-solid fa-xmark"></i> Close
            </button>
        </div>

        <form class="hr-custom-form" id="hrEditPolicyForm">
            <input type="hidden" id="editPolicyId">
            
            <div class="hr-custom-field-group">
                <label for="editPolicyHeading" class="hr-custom-field-label">
                    <i class="fa-solid fa-heading hr-custom-field-icon"></i> Main Heading
                </label>
                <input type="text" id="editPolicyHeading" class="hr-custom-field-input" required>
            </div>

            <div class="hr-custom-field-group">
                <label for="editPolicyShortDesc" class="hr-custom-field-label">
                    <i class="fa-solid fa-align-left hr-custom-field-icon"></i> Short Description
                </label>
                <input type="text" id="editPolicyShortDesc" class="hr-custom-field-input" required>
            </div>

            <div class="hr-custom-field-group">
                <label for="editPolicyLongDesc" class="hr-custom-field-label">
                    <i class="fa-solid fa-file-lines hr-custom-field-icon"></i> Detailed Description
                </label>
                <textarea id="editPolicyLongDesc" class="hr-custom-field-textarea" rows="7" required></textarea>
            </div>

            <!-- Custom Actions to Match Premium Form styles -->
            <div class="hr-custom-actions">
                <button type="submit" class="hr-custom-btn-publish" id="hrBtnSaveChanges">
                    <i class="fa-solid fa-floppy-disk"></i> Save Changes
                </button>
            </div>
        </form>
    </div>
</section>
