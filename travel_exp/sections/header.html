<header class="page-header">
    <div class="header-left">
        <h1 class="page-title">Travel Expenses Tracker</h1>
        
    </div>
    <div class="header-right">
        <!-- Month Picker Wrapper -->
        <div class="month-picker-wrapper">
            <div class="month-badge" id="month-badge">
                <i class="fa-solid fa-calendar-days"></i>
                <span id="badge-text">Showing March 2026</span>
                <i class="fa-solid fa-chevron-down" style="font-size:11px;opacity:0.6;margin-left:4px;"></i>
            </div>
            <!-- Dropdown Panel -->
            <div class="month-dropdown" id="month-dropdown">
                <div class="month-dropdown-header">
                    <div class="year-nav">
                        <button id="picker-year-prev"><i class="fa-solid fa-chevron-left"></i></button>
                        <span class="year-label" id="picker-year-label">2026</span>
                        <button id="picker-year-next"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="months-grid" id="picker-months-grid">
                    <!-- built by JS -->
                </div>
            </div>
        </div>
    </div>
</header>
