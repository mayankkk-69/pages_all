I<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/mobile.css" media="screen and (max-width: 768px)">
</head>
<body>
    <div class="page-container">
        <!-- Breadcrumb & Top Tabs -->
        <header class="section-header">
            <div class="breadcrumb">
                <span class="link">Dashboard</span> > <span class="current">My Profile</span>
            </div>
            
            <nav class="profile-tabs">
                <button class="tab-btn active" data-target="personal-info">Personal Info</button>
                <button class="tab-btn" data-target="security">Security</button>
                <button class="tab-btn" data-target="notifications">Notifications</button>
                <button class="tab-btn" data-target="activity-log">Activity Log</button>
                <button class="tab-btn" data-target="hr-documents">HR Documents</button>
            </nav>
        </header>

        <main class="profile-content">
            <div class="tab-page active" id="personal-info"></div>
            <div class="tab-page" id="security"></div>
            <div class="tab-page" id="notifications"></div>
            <div class="tab-page" id="activity-log"></div>
            <div class="tab-page" id="hr-documents"></div>
        </main>
    </div>

    <!-- MODALS -->
    <!-- Upload Photo Modal -->
    <div class="modal-overlay" id="modal-upload-photo">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title-group">
                    <h3 class="modal-title">Upload Profile Picture</h3>
                </div>
                <div class="modal-header-right">
                    <button class="modal-close">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                 <div class="modal-content-box">
                     <div class="file-drop-area">
                          <input type="file" class="file-input">
                          <span class="file-msg">Choose file or drag & drop</span>
                     </div>
                     <p class="sub-text text-center mt-2">Supported formats: JPG, PNG (Max 5MB)</p>
                 </div>
                 <div class="mt-4 text-center">
                     <button class="btn btn-primary">Upload Photo</button>
                 </div>
            </div>
        </div>
    </div>

    <!-- Add Education Modal -->
    <div class="modal-overlay" id="modal-add-education">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title-group">
                    <h3 class="modal-title">Add Education Background</h3>
                </div>
                <div class="modal-header-right">
                    <button class="modal-close">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-content-box form-grid grid-1">
                    <div class="form-group full-width">
                        <label>Degree Level*</label>
                        <select>
                            <option>Select Degree</option>
                            <option>High School</option>
                            <option>Bachelor's</option>
                            <option>Master's</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Institution Name*</label>
                        <input type="text" placeholder="Enter institution name">
                    </div>
                    <div class="form-group full-width">
                        <label>Field of Study*</label>
                        <input type="text" placeholder="Enter your field of study">
                    </div>
                    <div class="form-group full-width">
                        <label>Graduation Year*</label>
                        <input type="text" placeholder="e.g. 2024">
                    </div>
                </div>
                <div class="form-actions mt-4 text-right">
                    <button class="btn btn-primary">Save Education</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Experience Modal -->
    <div class="modal-overlay" id="modal-add-experience">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title-group">
                    <h3 class="modal-title">Add Work Experience</h3>
                </div>
                <div class="modal-header-right">
                    <button class="modal-close">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-content-box form-grid grid-1">
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" placeholder="Enter company name">
                    </div>
                    <div class="form-group">
                        <label>Job Title</label>
                        <input type="text" placeholder="Enter your job title">
                    </div>
                    <div class="form-group">
                        <label>Years of Experience</label>
                        <input type="text" placeholder="e.g. 2 years">
                    </div>
                    <div class="form-group">
                        <label>Key Responsibilities</label>
                        <textarea rows="3" placeholder="Describe your key responsibilities"></textarea>
                    </div>
                </div>
                <div class="form-actions mt-4 text-right">
                    <button class="btn btn-primary">Save Experience</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Document Modal -->
    <div class="modal-overlay" id="modal-add-document">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title-group">
                    <h3 class="modal-title">Upload Document</h3>
                </div>
                <div class="modal-header-right">
                    <button class="modal-close">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                 <div class="modal-content-box form-grid grid-1">
                    <div class="form-group">
                        <label>Document Type</label>
                        <select>
                            <option>Select Document Type</option>
                            <option>Certificates</option>
                            <option>ID Proof</option>
                            <option>Address Proof</option>
                        </select>
                    </div>
                    <div class="form-group file-upload-group mt-2">
                        <label>File</label>
                        <div class="file-drop-area">
                             <input type="file" class="file-input">
                             <span class="file-msg">Choose file or drag & drop</span>
                        </div>
                    </div>
                 </div>
                 <div class="mt-4 text-right">
                     <button class="btn btn-primary">Add Document</button>
                 </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/script.js"></script>
</body>
</html>
