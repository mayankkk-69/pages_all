            <section class="card section-notifications">
                <h2 class="section-title">Notification Preferences</h2>

                <div class="notification-row">
                    <div class="notification-info">
                        <div class="notification-title">Email Notifications</div>
                        <div class="notification-subtext">Receive updates via email</div>
                    </div>
                    <div class="toggle-switch">
                        <input type="checkbox" id="toggle-email" checked>
                        <label for="toggle-email"></label>
                    </div>
                </div>

                <div class="notification-row">
                    <div class="notification-info">
                        <div class="notification-title">Push Notifications</div>
                        <div class="notification-subtext">Receive notifications in browser</div>
                    </div>
                    <div class="toggle-switch">
                        <input type="checkbox" id="toggle-push">
                        <label for="toggle-push"></label>
                    </div>
                </div>
            </section>
